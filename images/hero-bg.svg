<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ABCAC"/>
      <stop offset="100%" stop-color="#0D9E90"/>
    </linearGradient>
    <filter id="glow-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-dot" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A0E1A" stop-opacity="1"/>
      <stop offset="36%"  stop-color="#0A0E1A" stop-opacity="0.98"/>
      <stop offset="56%"  stop-color="#0A0E1A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
  </defs>

