  <!-- Accent 3 → bottom edge trace -->
  <polyline points="1225,450 1312,488 1362,540" fill="none" stroke="#0D9E90" stroke-width="0.7" opacity="0.18"/>

  <!-- ══ LEFT FADE ══ -->
